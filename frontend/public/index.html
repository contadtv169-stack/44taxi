<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="44Taxi - Mobilidade e Delivery" />
  <meta name="google" content="notranslate" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="preconnect" href="https://wnjpzsxrwwrskakrhfgg.supabase.co" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <title>44Taxi - Mobilidade e Delivery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    .splash-init {
      position: fixed; inset: 0; z-index: 999999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #1e3a5f, #2563eb, #3b82f6);
      color: #fff; font-family: system-ui, sans-serif;
    }
    .splash-init h1 { font-size: 42px; font-weight: 900; letter-spacing: -1px; }
    .splash-init p { font-size: 14px; opacity: .7; margin-top: 8px; }
    .splash-init .spinner { margin-top: 32px; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: sp .8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    #js-error {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 999999;
      background: #ef4444; color: #fff; padding: 16px; font-size: 13px; font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="splash-init">
      <h1><span style="color:rgba(255,255,255,.3)">44</span>Taxi</h1>
      <p>Mobilidade &bull; Delivery</p>
      <div class="spinner"></div>
    </div>
  </div>
  <div id="js-error"></div>
</body>
</html>
