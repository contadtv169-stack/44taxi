<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="44Taxi - Mobilidade e Delivery. Solicite corridas, peça comida, faça entregas." />
  <meta name="keywords" content="taxi, delivery, corrida, comida, moto, carro, 44taxi" />
  <meta name="google" content="notranslate" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="preconnect" href="https://wnjpzsxrwwrskakrhfgg.supabase.co" />
  <link rel="preconnect" href="https://kryptgateway.netlify.app" />
  <link rel="dns-prefetch" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <title>44Taxi - Mobilidade e Delivery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    /* Splash loading screen */
    .splash-init {
      position: fixed; inset: 0; z-index: 999999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #1e3a5f, #2563eb, #3b82f6);
      color: #fff;
      font-family: system-ui, sans-serif;
    }
    .splash-init h1 { font-size: 42px; font-weight: 900; letter-spacing: -1px; margin-bottom: 4px; }
    .splash-init p { font-size: 14px; opacity: 0.7; }
    .splash-init .spinner {
      margin-top: 32px; width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff;
      border-radius: 50%; animation: sp 0.8s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="splash-init">
      <h1><span style="color: rgba(255,255,255,0.3)">44</span>Taxi</h1>
      <p>Mobilidade • Delivery</p>
      <div class="spinner"></div>
    </div>
  </div>
</body>
</html>
